server:
    port: 8080
    servlet:
        context-path: /api

spring:
    application:
        name: control-panel
    
    datasource:
        url: jdbc:h2:mem:controlpanel;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
        driver-class-name: org.h2.Driver
        username: sa
        password: 
        
    jpa:
        hibernate:
            ddl-auto: create-drop
        show-sql: false
        properties:
            hibernate:
                dialect: org.hibernate.dialect.H2Dialect
                format_sql: true
                
    h2:
        console:
            enabled: true
            path: /h2-console
            
    jackson:
        serialization:
            write-dates-as-timestamps: false
        deserialization:
            fail-on-unknown-properties: false
        default-property-inclusion: non_null

# Drools Configuration
drools:
    rules-path: rules/
    auto-scan: true
    scan-interval: 30000

# Rule Engine Configuration
rule-engine:
    max-rules-per-session: 10000
    clock-type: realtime
    
# Actuator Configuration
management:
    endpoints:
        web:
            exposure:
                include: health,info,metrics,env
    endpoint:
        health:
            show-details: when_authorized

# Logging Configuration
logging:
    level:
        root: INFO
        com.transaction.tagging: DEBUG
        org.drools: WARN
        org.springframework: INFO
    pattern:
        console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n"

# OpenAPI/Swagger Configuration
springdoc:
    api-docs:
        path: /api-docs
    swagger-ui:
        path: /swagger-ui.html
        enabled: true
