# Application Configuration
# ==========================

# Database Configuration
database.url=jdbc:h2:mem:transactions;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
database.username=sa
database.password=xxxxxxxx

# Rule Engine Configuration
rules.file.path=rules/TransactionRule.drl
rules.reload.interval.ms=60000

# Output Configuration
output.path=output/transactions.parquet

# Parquet Configuration
parquet.row.group.size=134217728
parquet.page.size=1048576

# Checkpointing Configuration
checkpoint.interval.ms=10000
checkpoint.timeout.ms=60000

# Rate Limiting Configuration
rate.limit.per.second=1000

# Flink Configuration
parallelism.default=1
state.backend=filesystem
state.checkpoints.dir=file:///tmp/flink-checkpoints
state.savepoints.dir=file:///tmp/flink-savepoints

# Logging Configuration
log.level=INFO
log.file=logs/transaction-tagging-flink.log
log.file.max.size=100MB
log.file.max.history=30
