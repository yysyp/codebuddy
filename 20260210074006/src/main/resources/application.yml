spring:
  application:
    name: transaction-rule-engine

  # H2 Database Configuration
  datasource:
    url: jdbc:h2:mem:transactiondb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: xxxxxxxx

  h2:
    console:
      enabled: true
      path: /h2-console

  # JPA Configuration
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Jackson Configuration
  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false

# Server Configuration
server:
  port: 8080
  compression:
    enabled: true
  tomcat:
    max-threads: 200
    accept-count: 100
    max-connections: 8192

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  metrics:
    tags:
      application: ${spring.application.name}

# OpenAPI/Swagger Configuration
springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# Application Configuration
app:
  # Drools Configuration
  drools:
    rules-path: classpath:rules/
    reload-interval: 30000 # 30 seconds

  # Flink Configuration
  flink:
    parallelism: 2
    checkpoint-interval: 5000
    state-backend: filesystem
    checkpoint-dir: ./flink-checkpoints

  # Parquet Configuration
  parquet:
    output-dir: ./parquet-output
    batch-size: 1000

  # Security Configuration
  security:
    rate-limit:
      enabled: true
      permits-per-second: 100
    circuit-breaker:
      enabled: true
      failure-rate-threshold: 50
      wait-duration-open-millis: 60000

# Logging Configuration
logging:
  level:
    root: INFO
    com.transaction: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.drools: INFO
    org.apache.flink: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} UTC [%thread] %-5level %logger{36} [TraceId=%X{traceId}] - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} UTC [%thread] %-5level %logger{36} [TraceId=%X{traceId}] - %msg%n"
  file:
    name: logs/application.log
    max-size: 100MB
    max-history: 30
    total-size-cap: 10GB
