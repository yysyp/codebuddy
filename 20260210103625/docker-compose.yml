version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:transactiondb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=
      - FLINK_PARALLELISM=2
      - OUTPUT_DIRECTORY=./output
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
    networks:
      - transaction-network

networks:
  transaction-network:
    driver: bridge
